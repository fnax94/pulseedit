<style>

    transition: border-color 0.3s, transform 0.3s;
    flex-shrink: 0;

  .hiw-card:hover {

    transform: translateY(-4px);

  .hiw-step-num {

    left: 50%;

<style>
  /* --- 3a. Gradient Orb (hero background decoration) --- */
  .hero-orb {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124, 111, 247, 0.25) 0%, rgba(79, 70, 229, 0.1) 40%, transparent 70%);
    filter: blur(80px);
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 0;
  }

  /* --- 3c. Floating Music Notes --- */
  @keyframes floatUp1 {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(-180px) rotate(15deg); opacity: 0; }
  }
  @keyframes floatUp2 {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.4; }
    90%  { opacity: 0.4; }
    100% { transform: translateY(-200px) rotate(-10deg); opacity: 0; }
  }
  @keyframes floatUp3 {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.5; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(-160px) rotate(20deg); opacity: 0; }
  }
  @keyframes floatUp4 {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.35; }
    90%  { opacity: 0.35; }
    100% { transform: translateY(-190px) rotate(-15deg); opacity: 0; }
  }

  .floating-notes {
    position: absolute;
    width: 100%;
    height: 300px;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .floating-note {
    position: absolute;
    bottom: 0;
  }
  .floating-note:nth-child(1) {
    left: 15%;
    animation: floatUp1 6s ease-in-out infinite;
  }
  .floating-note:nth-child(2) {
    left: 40%;
    animation: floatUp2 8s ease-in-out infinite 2s;
  }
  .floating-note:nth-child(3) {
    left: 65%;
    animation: floatUp3 7s ease-in-out infinite 1s;
  }
  .floating-note:nth-child(4) {
    left: 85%;
    animation: floatUp4 9s ease-in-out infinite 3s;
  }
</style>
